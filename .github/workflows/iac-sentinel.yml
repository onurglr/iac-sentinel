name: iac-sentinel

# Trigger: run on every PR open/update. This is what makes the tool part of the
# team's workflow instead of a script someone remembers to run.
on:
  pull_request:
    types: [opened, synchronize, reopened]

# Least privilege: grant the job token only the permissions it actually needs.
permissions:
  contents: read          # check out the repo
  pull-requests: write    # post/update the review comment
  models: read            # call GitHub Models (the LLM)

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Dogfooding: run iac-sentinel through its OWN composite action (`uses: ./`)
      # instead of manual setup/install/run steps. This is the exact entry point
      # other repos use — so our own CI proves the action works before we tag v1.
      # The action handles setup-python + install internally; `token` defaults to
      # github.token, which the permissions block above scopes to models:read +
      # pull-requests:write.
      #
      # DEMO: we point at a committed sample plan so CI needs no cloud creds. In a
      # real repo the caller would generate the plan first (terraform init/plan/show)
      # and pass plan-path: plan.json — see README, "Why you generate the plan".
      - uses: ./
        with:
          plan-path: tests/fixtures/contextual_plan.json
